<!DOCTYPE html>
<html>
<head>
    <title>Generate NursePulse Icon</title>
</head>
<body>
    <canvas id="pwaIcon" width="512" height="512" style="display:none;"></canvas>
    <p>Generating your 512x512 PWA icon... Check your downloads folder.</p>

    <script>
        const canvas = document.getElementById('pwaIcon');
        const ctx = canvas.getContext('2d');

        // 1. Background Gradient (Clean Deep Teal/Cyan)
        const gradient = ctx.createLinearGradient(0, 0, 0, 512);
        gradient.addColorStop(0, '#005f60');
        gradient.addColorStop(1, '#002d30');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 512, 512);

        // 2. Main Calendar Card Container
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 4;
        roundRect(ctx, 64, 64, 384, 384, 48, true, true);

        // Calendar Grid Elements (Top bar)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        roundRect(ctx, 64, 64, 384, 80, {tl: 48, tr: 48, bl: 0, br: 0}, true, false);

        // 3. Draw the Nurse Pulse Line (Medical Rhythm)
        ctx.beginPath();
        ctx.moveTo(90, 270);
        ctx.lineTo(160, 270);
        ctx.lineTo(190, 180); // Sharp Up
        ctx.lineTo(230, 360); // Sharp Down
        ctx.lineTo(260, 240); // Recovery
        ctx.lineTo(280, 270);
        ctx.lineTo(340, 270);
        ctx.strokeStyle = '#26a69a'; // Active Medical Cyan
        ctx.lineWidth = 14;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = 'rgba(38, 166, 154, 0.5)';
        ctx.shadowBlur = 15;
        ctx.stroke();

        // Reset shadow
        ctx.shadowBlur = 0;

        // 4. Draw the Traffic-Light Status Dots (Vertical Stack)
        const dotsX = 390;
        const dotRadius = 14;
        
        // Red Dot (Top - Fatigue/Work)
        ctx.beginPath();
        ctx.arc(dotsX, 210, dotRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#ef5350';
        ctx.fill();

        // Yellow Dot (Middle - Buffer)
        ctx.beginPath();
        ctx.arc(dotsX, 260, dotRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffca28';
        ctx.fill();

        // Green Dot (Bottom - Energetic/Free Time)
        ctx.beginPath();
        ctx.arc(dotsX, 310, dotRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#66bb6a';
        ctx.fill();

        // Helper function for rounded rectangles
        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            if (typeof radius === 'number') {
                radius = {tl: radius, tr: radius, bl: radius, br: radius};
            }
            ctx.beginPath();
            ctx.moveTo(x + radius.tl, y);
            ctx.lineTo(x + width - radius.tr, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
            ctx.lineTo(x + width, y + height - radius.br);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
            ctx.lineTo(x + radius.bl, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
            ctx.lineTo(x, y + radius.tl);
            ctx.quadraticCurveTo(x, y, x + radius.tl, y);
            ctx.closePath();
            if (fill) ctx.fill();
            if (stroke) ctx.stroke();
        }

        // Trigger Auto-Download
        const link = document.createElement('a');
        link.download = 'icon.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    </script>
</body>
</html>
